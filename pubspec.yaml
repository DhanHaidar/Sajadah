name: sajadah
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: 
  flutter_bloc:
  hydrated_bloc: 
  path_provider:  
  firebase_core: 
  firebase_auth:
  supabase_flutter:
  image_picker: ^1.2.2
  file_selector: ^1.0.3
  get_it: 
  dartz: 
  cloud_firestore: 
  qr_flutter: ^4.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/vectors/
  
  fonts:
    - family: Satoshi

      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 600
        - asset: assets/fonts/Satoshi-Light.ttf
          weight: 300
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900

